<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CivicPlus Internal Toolkit - Fancy Button Library</title>
  <link rel="stylesheet" type="text/css" href="../css/button-library.css" />
</head>
<body>
  <div id="top-banner">
    <div id="banner-content">
      <div id="banner-text">
        <h1>Fancy Button Library</h1>
        <p>Your saved buttons and built-in templates</p>
      </div>
    </div>
  </div>

  <div id="page-wrap">
    <div id="buttons-toolbar">
      <div id="toolbar-left">
        <button id="btn-import" class="toolbar-btn primary" title="Import button library from JSON file">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          Import
        </button>
        <button id="btn-export" class="toolbar-btn" title="Export saved buttons to JSON file">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
          Export
        </button>
      </div>
      <div id="toolbar-right">
        <input type="text" id="search-input" placeholder="Search buttons..." />
        <div id="view-toggle" title="Switch view">
          <button class="view-btn active" data-view="grid">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect></svg>
          </button>
          <button class="view-btn" data-view="list">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
          </button>
        </div>
      </div>
    </div>

    <div id="buttons-empty" class="empty-state" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
        <line x1="9" y1="9" x2="15" y2="9"></line>
      </svg>
      <h3>No Buttons Yet</h3>
      <p>Import buttons from the CMS Graphic Links page, or click "Import" to load a JSON file.</p>
    </div>
    <div id="buttons-grid"></div>
  </div>

  <!-- JSON View Modal -->
  <div id="json-modal-overlay" style="display:none;">
    <div id="json-modal">
      <div id="json-modal-header">
        <h3 id="json-modal-title">Button JSON</h3>
        <button id="json-modal-close">&times;</button>
      </div>
      <div id="json-modal-body">
        <textarea id="json-modal-code" readonly rows="16"></textarea>
      </div>
      <div id="json-modal-footer">
        <button id="json-modal-delete" class="modal-btn delete" style="display:none;">Delete</button>
        <div style="flex:1;"></div>
        <button id="json-modal-cancel" class="modal-btn secondary">Close</button>
        <button id="json-modal-download" class="modal-btn secondary">Download</button>
        <button id="json-modal-copy" class="modal-btn primary">Copy to Clipboard</button>
      </div>
    </div>
  </div>

  <script src="../js/button-library-page.js"></script>
</body>
</html>
